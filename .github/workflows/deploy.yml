name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Ga naar de specifieke map van KwaliteitV2
            cd /var/www/kwaliteitv2

            # Haal de nieuwste code op van GitHub
            git pull origin main

            # Herstart alleen de app van KwaliteitV2
            docker compose -f compose.server.yaml restart app

            # Voer migraties en cache-optimalisaties uit voor KwaliteitV2
            docker compose -f compose.server.yaml exec -T app php artisan migrate --force
            docker compose -f compose.server.yaml exec -T app php artisan config:cache
            docker compose -f compose.server.yaml exec -T app php artisan route:cache
            docker compose -f compose.server.yaml exec -T app php artisan view:cache
