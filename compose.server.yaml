name: kwaliteitv2

services:

  app:
    container_name: kwv2-webserver
    build: .
    image: kwv2-app:latest
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
      if [ ! -f .env ]; then
        echo '❌ GEEN .env GEVONDEN OP DE SERVER!';
        exit 1;
      fi;

      echo '📦 Composer packages installeren (productie)...';
      composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev ;

      echo '🎨 Frontend bouwen...';
      npm ci && npm run build ;

      echo '⏳ Wachten tot MySQL bereikbaar is...';
      while ! php artisan migrate --force; do
        echo '😴 Database slaapt nog... 3 seconden wachten...';
        sleep 3;
      done;

      echo '⚡ Laravel caches opwarmen...';
      php artisan config:cache ;
      php artisan route:cache ;
      php artisan view:cache ;

      echo '🔓 Bestandsrechten instellen...';
      chown -R 1000:1000 /var/www/html/storage /var/www/html/bootstrap/cache ;

      echo '✅ Server wordt gestart...';
      php artisan serve --host=0.0.0.0 --port=8000
      "

  queue:
    container_name: kwv2-queue
    image: kwv2-app:latest
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: >
      bash -c "
      if [ ! -f .env ]; then
        echo '❌ GEEN .env GEVONDEN. Queue worker stopt.';
        exit 1;
      fi;
      while ! php artisan db:show > /dev/null 2>&1; do
        echo '😴 Wachten op DB...';
        sleep 3;
      done;
      echo '✅ Queue worker gestart.';
      while true; do
        php artisan queue:work --tries=3 --max-jobs=100 --max-time=3600 --sleep=3;
        echo '🔄 Queue worker gestopt, wordt over 2 seconden herstart...';
        sleep 2;
      done
      "

  db:
    container_name: kwv2-db
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - kwv2-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  kwv2-db-data:
