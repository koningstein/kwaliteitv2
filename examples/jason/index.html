        // Sample data
        const qualityData = {
            themes: [
                {
                    id: 'OP',
                    name: 'Onderwijsproces',
                    color: '#2563eb',
                    standards: [
                        {
                            id: 'OP0',
                            name: 'Basisvaardigheden',
                            description: 'Het onderwijs in basisvaardigheden bereidt de studenten voor op het vervolgonderwijs, de arbeidsmarkt en de samenleving.',
                            criteria: [
                                {
                                    id: 'OP0-1',
                                    number: 1,
                                    text: 'Het onderwijsprogramma voor Nederlandse taal is dekkend voor het referentieniveaus dat is vastgesteld voor het betreffende opleidingsniveau.',
                                    status: 'attention',
                                    indicators: [
                                        'Het curriculum bevat leerdoelen die volledig aansluiten op en corresponderen met de vereiste referentieniveaus (2F/3F)',
                                        'In het programma zijn voldoende lesuren gepland voor Nederlands',
                                        'Er is een lesplan',
                                        'Er is een toets- en examenplan',
                                        'Het toets- en examenplan is voorafgaand aan de onderwijsactiviteiten doorgenomen met de student',
                                        'De opleiding biedt extra ondersteuning aan studenten die achterstanden of specifieke leerbehoeften hebben'
                                    ],
                                    explanation: 'Extra ondersteuning studenten met achterstanden of specifieke leerbehoeften onvoldoende voor N3 en N4.',
                                    years: { 2025: 'attention', 2026: null, 2027: null },
                                    actionPoints: [
                                        {
                                            id: 'ap1',
                                            description: 'Extra ondersteuningsprogramma ontwikkelen voor N3/N4 studenten',
                                            responsible: 'Jan de Vries',
                                            startDate: '2026-01-01',
                                            endDate: '2026-03-01',

                                            evaluation: 'De eerste versie van het ondersteuningsprogramma is ontwikkeld en wordt getest.'
                                        }
                                    ]
                                },
                                {
                                    id: 'OP0-2',
                                    number: 2,
                                    text: 'Het onderwijsprogramma voor Engelse taal is dekkend voor het referentieniveau dat is vastgesteld voor niveau 4.',
                                    status: 'attention',
                                    indicators: [
                                        'Het curriculum bevat leerdoelen die volledig aansluiten op en corresponderen met de vereiste referentieniveaus (A2/B1)',
                                        'In het programma zijn voldoende lesuren gepland voor Engelse taal',
                                        'Er is een lesplan',
                                        'Er is een toets- en examenplan',
                                        'Het toets- en examenplan is voorafgaand aan de onderwijsactiviteiten doorgenomen met de student'
                                    ],
                                    explanation: '',
                                    years: { 2025: 'attention', 2026: null, 2027: null },
                                    actionPoints: []
                                },
                                {
                                    id: 'OP0-3',
                                    number: 3,
                                    text: 'Het onderwijsprogramma voor rekenen is dekkend voor het rekenniveau dat is vastgesteld voor het betreffende opleidingsniveau.',
                                    status: 'sufficient',
                                    indicators: [
                                        'Het curriculum bevat leerdoelen die volledig aansluiten op en corresponderen met de vereiste rekenniveaus',
                                        'In het programma zijn voldoende lesuren gepland voor rekenen',
                                        'Er is een lesplan',
                                        'Er is een toets- en examenplan'
                                    ],
                                    explanation: '',
                                    years: { 2025: 'sufficient', 2026: null, 2027: null },
                                    actionPoints: []
                                }
                            ]
                        },
                        {
                            id: 'OP1',
                            name: 'Aanbod',
                            description: 'Het onderwijsaanbod sluit aan op de kwalificatie-eisen.',
                            criteria: []
                        }
                    ]
                },
                {
                    id: 'VS',
                    name: 'Veiligheid en schoolklimaat',
                    color: '#16a34a',
                    standards: [
                        {
                            id: 'VS1',
                            name: 'Veiligheid',
                            description: 'De opleiding biedt een veilige leeromgeving.',
                            criteria: []
                        }
                    ]
                },
                {
                    id: 'BA',
                    name: 'Borging en afsluiting',
                    color: '#dc2626',
                    standards: [
                        {
                            id: 'BA1',
                            name: 'Borging diplomering',
                            description: 'De opleiding borgt de kwaliteit van de diplomering.',
                            criteria: []
                        }
                    ]
                },
                {
                    id: 'OR',
                    name: 'Onderwijsresultaten',
                    color: '#ca8a04',
                    standards: [
                        {
                            id: 'OR1',
                            name: 'Studiesucces',
                            description: 'Studenten behalen hun diploma binnen de gestelde termijn.',
                            criteria: []
                        }
                    ]
                },
                {
                    id: 'SKA',
                    name: 'Sturen, kwaliteitszorg en ambitie',
                    color: '#7c3aed',
                    standards: [
                        {
                            id: 'SKA1',
                            name: 'Visie, ambities en doelen',
                            description: 'De opleiding heeft een duidelijke visie en ambities.',
                            criteria: []
                        }
                    ]
                }
            ]
        };

        // Team Overview Component (voorheen PersonenOverview)
        const PersonenOverview = ({ data, onBack }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedPerson, setSelectedPerson] = useState(null);
            
            // Verzamel alle actiepunten gegroepeerd per persoon
            const personenMap = new Map();
            
            data.themes.forEach(theme => {
                theme.standards.forEach(standard => {
                    standard.criteria.forEach(criterion => {
                        if (criterion.actionPoints && criterion.actionPoints.length > 0) {
                            criterion.actionPoints.forEach(ap => {
                                const responsible = ap.responsible || 'Onbekend';
                                
                                if (!personenMap.has(responsible)) {
                                    personenMap.set(responsible, []);
                                }
                                
                                personenMap.get(responsible).push({
                                    ...ap,
                                    themeName: theme.name,
                                    themeId: theme.id,
                                    themeColor: theme.color,
                                    standardName: standard.name,
                                    criterionNumber: criterion.number,
                                    criterionText: criterion.text
                                });
                            });
                        }
                    });
                });
            });

            // Converteer Map naar gesorteerde array
            const allPersonen = Array.from(personenMap.entries())
                .map(([name, actionPoints]) => ({
                    name,
                    actionPoints,
                    stats: {
                        total: actionPoints.length,
                        notStarted: actionPoints.filter(ap => (ap.status || 'not_started') === 'not_started').length,
                        onTrack: actionPoints.filter(ap => ap.status === 'on_track').length,
                        delayed: actionPoints.filter(ap => ap.status === 'delayed').length,
                        postponed: actionPoints.filter(ap => ap.status === 'postponed').length,
                        completed: actionPoints.filter(ap => ap.status === 'completed').length
                    }
                }))
                .sort((a, b) => a.name.localeCompare(b.name));

            // Filter op zoekterm
            const personen = searchTerm 
                ? allPersonen.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()))
                : allPersonen;

            const getStatusConfig = (status) => {
                const configs = {
                    not_started: { label: 'Niet gestart', color: 'bg-slate-100 text-slate-700 border-slate-300' },
                    on_track: { label: 'Op schema', color: 'bg-emerald-100 text-emerald-700 border-emerald-300' },
                    delayed: { label: 'Loopt achter', color: 'bg-amber-100 text-amber-700 border-amber-300' },
                    postponed: { label: 'Uitgesteld', color: 'bg-orange-100 text-orange-700 border-orange-300' },
                    completed: { label: 'Afgerond', color: 'bg-blue-100 text-blue-700 border-blue-300' }
                };
                return configs[status] || configs.not_started;
            };

            const formatDateRange = (startDate, endDate) => {
                const end = new Date(endDate);
                const endStr = end.toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
                return `Deadline: ${endStr}`;
            };

            // Als een persoon is geselecteerd, toon detail view
            if (selectedPerson) {
                const persoon = allPersonen.find(p => p.name === selectedPerson);
                
                return (
                    <div className="space-y-6">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button
                                    onClick={() => setSelectedPerson(null)}
                                    className="p-2 hover:bg-slate-100 rounded-lg transition-colors"
                                >
                                    <svg className="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                                    </svg>
                                </button>
                                <div className="flex items-center gap-3">
                                    <div className="w-16 h-16 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white font-bold text-2xl shadow-lg">
                                        {persoon.name.substring(0, 2).toUpperCase()}
                                    </div>
                                    <div>
                                        <h2 className="text-2xl font-bold text-slate-900">{persoon.name}</h2>
                                        <p className="text-slate-600">{persoon.stats.total} {persoon.stats.total === 1 ? 'actiepunt' : 'actiepunten'}</p>
                                    </div>
                                </div>
                            </div>
                            <button
                                onClick={onBack}
                                className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition-colors font-medium"
                            >
                                ← Terug naar Dashboard
                            </button>
                        </div>

                        {/* Statistieken */}
                        <div className="flex flex-wrap gap-2">
                            {persoon.stats.notStarted > 0 && (
                                <span className="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-slate-100 text-slate-700 border border-slate-300">
                                    {persoon.stats.notStarted} Niet gestart
                                </span>
                            )}
                            {persoon.stats.onTrack > 0 && (
                                <span className="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-emerald-100 text-emerald-700 border border-emerald-300">
                                    {persoon.stats.onTrack} Op schema
                                </span>
                            )}
                            {persoon.stats.delayed > 0 && (
                                <span className="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-amber-100 text-amber-700 border border-amber-300">
                                    {persoon.stats.delayed} Loopt achter
                                </span>
                            )}
                            {persoon.stats.postponed > 0 && (
                                <span className="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-orange-100 text-orange-700 border border-orange-300">
                                    {persoon.stats.postponed} Uitgesteld
                                </span>
                            )}
                            {persoon.stats.completed > 0 && (
                                <span className="inline-flex items-center px-3 py-1.5 rounded-full text-sm font-medium bg-blue-100 text-blue-700 border border-blue-300">
                                    {persoon.stats.completed} Afgerond
                                </span>
                            )}
                        </div>

                        {/* Actiepunten lijst */}
                        <div>
                            <h3 className="text-lg font-semibold text-slate-900 mb-4">Actiepunten:</h3>
                            <div className="space-y-3">
                                {persoon.actionPoints
                                    .sort((a, b) => {
                                        if (a.status === 'completed' && b.status !== 'completed') return 1;
                                        if (a.status !== 'completed' && b.status === 'completed') return -1;
                                        return new Date(a.endDate) - new Date(b.endDate);
                                    })
                                    .map((ap, apIdx) => {
                                        const statusConfig = getStatusConfig(ap.status || 'not_started');
                                        const isCompleted = ap.status === 'completed';
                                        const isOverdue = !isCompleted && new Date(ap.endDate) < new Date();
                                        
                                        return (
                                            <div 
                                                key={apIdx}
                                                className={`p-4 rounded-lg border-2 ${isCompleted ? 'bg-emerald-50 border-emerald-200' : isOverdue ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200'}`}
                                            >
                                                <div className="flex items-start gap-3">
                                                    <div 
                                                        className="w-1 h-full rounded flex-shrink-0"
                                                        style={{ backgroundColor: ap.themeColor, minHeight: '60px' }}
                                                    />
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-start justify-between gap-3 mb-2">
                                                            <div className="flex-1">
                                                                <div className="text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded inline-block mb-2">
                                                                    {ap.themeId} → {ap.standardName} → Criterium {ap.criterionNumber}
                                                                </div>
                                                                <h5 className={`font-bold text-sm mb-1 ${isCompleted ? 'text-emerald-900' : isOverdue ? 'text-red-900' : 'text-slate-900'}`}>
                                                                    {isCompleted && <span className="mr-1">✓</span>}
                                                                    {isOverdue && !isCompleted && <span className="mr-1">⚠️</span>}
                                                                    {ap.description}
                                                                </h5>
                                                                <p className="text-xs text-slate-600 mb-2">{ap.criterionText}</p>
                                                            </div>
                                                            <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border ${statusConfig.color} flex-shrink-0`}>
                                                                {statusConfig.label}
                                                            </span>
                                                        </div>
                                                        
                                                        <div className={`text-xs ${isCompleted ? 'text-emerald-700' : isOverdue ? 'text-red-700 font-semibold' : 'text-slate-600'}`}>
                                                            {formatDateRange(ap.startDate, ap.endDate)}
                                                            {isOverdue && !isCompleted && <span className="ml-2">(Verlopen!)</span>}
                                                        </div>

                                                        {ap.evaluation && (
                                                            <div className={`mt-2 pt-2 border-t ${isCompleted ? 'border-emerald-200' : 'border-slate-200'}`}>
                                                                <p className={`text-xs font-semibold mb-1 ${isCompleted ? 'text-emerald-800' : 'text-slate-700'}`}>Evaluatie:</p>
                                                                <p className={`text-xs italic ${isCompleted ? 'text-emerald-700' : 'text-slate-600'}`}>{ap.evaluation}</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                            </div>
                        </div>
                    </div>
                );
            }

            // Grid overview
            return (
                <div className="space-y-6">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-900">Team Overzicht</h2>
                            <p className="text-slate-600 mt-1">{allPersonen.length} {allPersonen.length === 1 ? 'teamlid' : 'teamleden'} met actiepunten</p>
                        </div>
                        <button
                            onClick={onBack}
                            className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition-colors font-medium"
                        >
                            ← Terug naar Dashboard
                        </button>
                    </div>

                    {/* Zoekbalk */}
                    <div className="relative">
                        <input
                            type="text"
                            placeholder="Zoek teamlid..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full md:w-96 px-4 py-3 pl-11 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all"
                        />
                        <svg className="w-5 h-5 text-slate-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>

                    {personen.length === 0 ? (
                        <div className="bg-white rounded-xl border border-slate-200 p-12 text-center">
                            <p className="text-slate-500 text-lg">
                                {searchTerm ? `Geen teamleden gevonden voor "${searchTerm}"` : 'Geen teamleden met actiepunten gevonden'}
                            </p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            {personen.map((persoon, idx) => {
                                const hasUrgent = persoon.actionPoints.some(ap => 
                                    ap.status !== 'completed' && new Date(ap.endDate) < new Date()
                                );
                                
                                return (
                                    <button
                                        key={idx}
                                        onClick={() => setSelectedPerson(persoon.name)}
                                        className="bg-white rounded-xl border-2 border-slate-200 p-5 hover:border-blue-400 hover:shadow-lg transition-all text-left group"
                                    >
                                        {/* Avatar en naam */}
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white font-bold text-lg shadow-md flex-shrink-0">
                                                {persoon.name.substring(0, 2).toUpperCase()}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-slate-900 truncate group-hover:text-blue-600 transition-colors">
                                                    {persoon.name}
                                                </h3>
                                                <p className="text-xs text-slate-500">
                                                    {persoon.stats.total} {persoon.stats.total === 1 ? 'actiepunt' : 'actiepunten'}
                                                </p>
                                            </div>
                                        </div>

                                        {/* Urgentie indicator */}
                                        {hasUrgent && (
                                            <div className="mb-3 px-2 py-1 bg-red-100 border border-red-300 rounded-lg flex items-center gap-1.5">
                                                <span className="text-red-700 font-bold text-xs">⚠️</span>
                                                <span className="text-red-700 font-semibold text-xs">Verlopende deadlines!</span>
                                            </div>
                                        )}
                                        
                                        {/* Compacte statistieken */}
                                        <div className="space-y-1.5">
                                            {persoon.stats.notStarted > 0 && (
                                                <div className="flex items-center justify-between text-xs">
                                                    <span className="text-slate-600">Niet gestart</span>
                                                    <span className="font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded">{persoon.stats.notStarted}</span>
                                                </div>
                                            )}
                                            {persoon.stats.onTrack > 0 && (
                                                <div className="flex items-center justify-between text-xs">
                                                    <span className="text-slate-600">Op schema</span>
                                                    <span className="font-bold text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded">{persoon.stats.onTrack}</span>
                                                </div>
                                            )}
                                            {persoon.stats.delayed > 0 && (
                                                <div className="flex items-center justify-between text-xs">
                                                    <span className="text-slate-600">Loopt achter</span>
                                                    <span className="font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded">{persoon.stats.delayed}</span>
                                                </div>
                                            )}
